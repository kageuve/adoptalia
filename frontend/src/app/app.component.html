<div style="text-align:center; margin-top: 50px; font-family: sans-serif;">
  <h1>🐾 Bienvenido a Adoptalia 🐾</h1>
  <h2>Lista de Usuarios en el Sistema:</h2>
  
  <ul style="list-style-type: none; padding: 0;">
    <li *ngFor="let user of usuarios" style="margin: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; display: inline-block;">
      <strong>{{ user.nombre }}</strong> - <span style="color: gray;">{{ user.rol }}</span>
    </li>
  </ul>
</div>
