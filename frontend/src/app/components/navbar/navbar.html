<nav class="navbar">
  <div class="logo" routerLink="/" routerLinkActive="active-logo">
    <div class="logo-icon">
      <img src="/img/logo3.png" alt="Logo Adoptalia" />
    </div>
    <span>Adoptalia</span>
  </div>

  <div class="burger-menu" (click)="toggleMenu()" [class.open]="menuOpen">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <ul class="links-container" [class.open]="menuOpen">
    <li>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">
        Inicio
      </a>
    </li>
    <li><a routerLink="/adoptar" routerLinkActive="active" (click)="closeMenu()">Adoptar</a></li>
    <li><a routerLink="/protectoras" routerLinkActive="active" (click)="closeMenu()">Protectoras</a></li>
    <li><a routerLink="/como-funciona" routerLinkActive="active" (click)="closeMenu()">Cómo funciona</a></li>
    <li><a routerLink="/impacto" routerLinkActive="active" (click)="closeMenu()">Impacto</a></li>

    <li class="mobile-actions">
      <ng-container *ngIf="!authService.isLoggedIn(); else loggedInMobile">
        <button class="btn-session" [routerLink]="['/login']" [queryParams]="{ mode: 'login' }" (click)="closeMenu()">Iniciar sesión</button>
        <button class="btn-login" [routerLink]="['/login']" [queryParams]="{ mode: 'register' }" (click)="closeMenu()">Registrarse</button>
      </ng-container>
      <ng-template #loggedInMobile>
        <button class="user-menu-trigger" type="button" (click)="toggleUserMenu($event)">
          <ng-container *ngIf="imagenPerfil; else mobileDefaultAvatar">
            <div class="profile-avatar">
              <img [src]="imagenPerfil" alt="Perfil" class="profile-avatar-img" />
              <span *ngIf="pendientes > 0" class="notif-badge">{{ pendientes }}</span>
            </div>
          </ng-container>
          <ng-template #mobileDefaultAvatar>
            <app-avatar-notif *ngIf="pendientes > 0" [size]="32" [count]="pendientes"></app-avatar-notif>
            <app-avatar-online *ngIf="pendientes === 0" [size]="32"></app-avatar-online>
          </ng-template>
          {{ authService.getEmail() }}
        </button>
        <div class="mobile-user-dropdown" [class.open]="userMenuOpen" (click)="$event.stopPropagation()">
          <button class="dropdown-item" type="button" (click)="goToPanel()">Mi panel</button>
          <button class="dropdown-item danger-item" type="button" (click)="logout()">Cerrar sesión</button>
        </div>
      </ng-template>
    </li>
  </ul>

  <div class="dsk-actions">
    <ng-container *ngIf="!authService.isLoggedIn(); else loggedIn">
      <button class="btn-session" [routerLink]="['/login']" [queryParams]="{ mode: 'login' }">Iniciar sesión</button>
      <button class="btn-login" [routerLink]="['/login']" [queryParams]="{ mode: 'register' }">Registrarse</button>
    </ng-container>
    <ng-template #loggedIn>
      <div class="user-menu" (click)="$event.stopPropagation()">
        <button class="user-menu-trigger" type="button" (click)="toggleUserMenu($event)">
          <ng-container *ngIf="imagenPerfil; else dskDefaultAvatar">
            <div class="profile-avatar">
              <img [src]="imagenPerfil" alt="Perfil" class="profile-avatar-img" />
              <span *ngIf="pendientes > 0" class="notif-badge">{{ pendientes }}</span>
            </div>
          </ng-container>
          <ng-template #dskDefaultAvatar>
            <app-avatar-notif *ngIf="pendientes > 0" [size]="36" [count]="pendientes"></app-avatar-notif>
            <app-avatar-online *ngIf="pendientes === 0" [size]="36"></app-avatar-online>
          </ng-template>
          {{ authService.getEmail() }}
        </button>
        <div class="user-dropdown" [class.open]="userMenuOpen">
          <button class="dropdown-item" type="button" (click)="goToPanel()">Mi panel</button>
          <button class="dropdown-item danger-item" type="button" (click)="logout()">Cerrar sesión</button>
        </div>
      </div>
    </ng-template>
  </div>
</nav>
