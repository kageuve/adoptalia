<div class="filter-wrapper">
  <div class="filters">

    <div class="filter-group">
      <label>Especie</label>
      <select [(ngModel)]="filtros.especie" (ngModelChange)="onFiltrosChange()">
        <option value="">Todas</option>
        <option value="Perro">Perro</option>
        <option value="Gato">Gato</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Provincia</label>
      <select [(ngModel)]="filtros.provincia" (ngModelChange)="onFiltrosChange()">
        <option value="">Todas</option>
        <option *ngFor="let provincia of provincias" [value]="provincia">{{ provincia }}</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Tamaño</label>
      <select [(ngModel)]="filtros.tamano" (ngModelChange)="onFiltrosChange()">
        <option value="">Todos</option>
        <option value="Pequeño">Pequeño</option>
        <option value="Mediano">Mediano</option>
        <option value="Grande">Grande</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Edad</label>
      <select [(ngModel)]="filtros.edad" (ngModelChange)="onFiltrosChange()">
        <option value="">Todas</option>
        <option value="joven">Joven</option>
        <option value="adulto">Adulto</option>
        <option value="senior">Senior</option>
      </select>
    </div>

    <button class="btn-search" *ngIf="!esPaginaAdoptar" (click)="aplicarFiltros()">Buscar</button>
    <button class="btn-search" *ngIf="hayFiltrosActivos()" (click)="limpiarFiltros()">Limpiar filtros</button>

  </div>
</div>
