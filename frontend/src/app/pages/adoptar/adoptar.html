<div class="adoptar-container">

  <div class="adoptar-header">
    <h2>Encuentra aquí a tu compañero ideal</h2>
  </div>


  <div class="filter-bar-container">
    <app-filter-bar></app-filter-bar>
  </div>

  <div class="empty-state-card" *ngIf="hayFiltrosActivos() && animalesFiltrados.length === 0">
    <p class="empty-state-copy">No hay animales que coincidan con los filtros seleccionados</p>
  </div>

  <div class="animals-grid" *ngIf="animalesFiltrados.length > 0">
    <div class="card" *ngFor="let animal of animalesFiltrados" [routerLink]="['/animal', animal.id]">
      
      <div class="image-wrapper">
        <img [src]="animal.imagen || './img/no-image.png'" [alt]="animal.nombre">
        <button *ngIf="esUsuario()" class="fav-btn" [class.fav-active]="esFavorito(animal.id)" (click)="toggleFavorito(animal.id, $event)" type="button" title="Añadir a favoritos">
          ♥
        </button>
      </div>

      <div class="card-content">
        <h3>{{ animal.nombre }}</h3>
        <p>{{ animal.raza }} · {{ animal.edad }} años</p>
        <span class="location">{{ animal.provincia }}</span>
      </div>

    </div>
  </div>

</div>
