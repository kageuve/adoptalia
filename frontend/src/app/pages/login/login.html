<div class="login-page">
  <div class="login-card">

    <!-- TABS USUARIO -->
    <div class="top-tabs">
      <button
        [class.active]="userType === 'adoptante'"
        (click)="setUserType('adoptante')">
        Adoptante
      </button>

      <button
        [class.active]="userType === 'protectora'"
        (click)="setUserType('protectora')">
        Protectora
      </button>
    </div>

    <h2>
      {{ isLogin ? 'Iniciar sesión' : 'Crear cuenta' }}
    </h2>

    <p class="subtitle">
      {{ userType === 'adoptante'
        ? 'Encuentra tu compañero ideal'
        : 'Gestiona tu protectora y sigue salvando vidas' }}
    </p>

    <!-- MENSAJE ERROR / ÉXITO -->
    <p class="msg-error" *ngIf="errorMsg">{{ errorMsg }}</p>
    <p class="msg-success" *ngIf="successMsg">{{ successMsg }}</p>

    <!-- LOGIN -->
    <form *ngIf="isLogin && loginForm"
          [formGroup]="loginForm"
          (ngSubmit)="onLogin()"
          class="form">

      <div class="input-group">
        <input type="email" formControlName="email" placeholder=" " />
        <label>Email</label>
      </div>

      <div class="input-group password-group">
        <input [type]="mostrarPassword ? 'text' : 'password'" formControlName="password" placeholder=" " />
        <label>Contraseña</label>
        <button type="button" class="toggle-password" (click)="togglePassword()">
          <svg *ngIf="!mostrarPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="mostrarPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>

      <button class="btn-primary" type="submit">
        Entrar
      </button>

      <p class="switch">
        ¿No tienes cuenta?
        <span (click)="toggleMode()">Regístrate</span>
      </p>

    </form>

    <!-- REGISTER -->
    <form *ngIf="!isLogin && registerForm"
          [formGroup]="registerForm"
          (ngSubmit)="onRegister()"
          class="form">

      <div class="input-group">
        <input type="text" formControlName="nombre" placeholder=" " />
        <label>{{ userType === 'protectora' ? 'Nombre de la protectora' : 'Nombre' }}</label>
      </div>

      <div class="input-group">
        <input type="email" formControlName="email" placeholder=" " />
        <label>Email</label>
      </div>

      <div class="input-group password-group">
        <input [type]="mostrarPasswordRegistro ? 'text' : 'password'" formControlName="password" placeholder=" " />
        <label>Contraseña</label>
        <button type="button" class="toggle-password" (click)="togglePasswordRegistro()">
          <svg *ngIf="!mostrarPasswordRegistro" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="mostrarPasswordRegistro" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>

      <!-- SOLO PROTECTORA -->
      <div *ngIf="userType === 'protectora'" class="extra-fields">

        <div class="input-group">
          <input type="text" formControlName="cif" placeholder=" " />
          <label>CIF</label>
        </div>

        <div class="input-group">
          <input type="text" formControlName="ciudad" placeholder=" " />
          <label>Ciudad</label>
        </div>

        <div class="input-group">
          <input type="text" formControlName="telefono" placeholder=" " />
          <label>Teléfono</label>
        </div>

      </div>

      <button class="btn-primary" type="submit">
        Crear cuenta
      </button>

      <p class="switch">
        ¿Ya tienes cuenta?
        <span (click)="toggleMode()">Inicia sesión</span>
      </p>

    </form>

  </div>
</div>
